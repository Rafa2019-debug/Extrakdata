<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Filter App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' },
                        dark: { bg: '#0f172a', card: '#1e293b', border: '#334155', text: '#e2e8f0', muted: '#94a3b8' }
                    }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }
        .dark * { scrollbar-color: #475569 transparent; }
        .drag-active { border-color: #3b82f6 !important; background: rgba(59,130,246,0.1) !important; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .toast { animation: slideIn 0.3s ease-out, fadeOut 0.3s ease-in 2.7s forwards; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; transform: translateX(100%); } }
        .sort-icon { transition: transform 0.2s; }
        .sort-asc .sort-icon { transform: rotate(180deg); }
        .sort-desc .sort-icon { transform: rotate(0deg); }
        .editable:focus { outline: 2px solid #3b82f6; border-radius: 4px; padding: 2px 4px; }
        .progress-bar { transition: width 0.3s ease; }
        .row-highlight:hover { background: rgba(59,130,246,0.08) !important; }
        .dark .row-highlight:hover { background: rgba(59,130,246,0.15) !important; }
        input[type="file"] { display: none; }
        .truncate-custom { max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        @media (max-width: 768px) { .truncate-custom { max-width: 120px; } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-dark-bg dark:text-dark-text transition-colors duration-300 min-h-screen">
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <header class="bg-white dark:bg-dark-card shadow-sm border-b dark:border-dark-border sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-primary-600 rounded-lg flex items-center justify-center text-white">
                    <i class="fas fa-filter text-lg"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold leading-tight">Data Filter</h1>
                    <p class="text-xs text-gray-500 dark:text-dark-muted">XLSX &middot; XLS &middot; CSV &middot; TXT</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="toggleDarkMode()" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-dark-border transition" title="Toggle Dark Mode">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:inline text-yellow-400"></i>
                </button>
                <button onclick="clearAllData()" class="p-2 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/30 text-red-500 transition" title="Hapus Semua Data">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6 space-y-6">
        <section class="bg-white dark:bg-dark-card rounded-xl shadow-sm border dark:border-dark-border p-6">
            <div id="drop-zone" class="border-2 border-dashed border-gray-300 dark:border-dark-border rounded-lg p-8 text-center transition-all cursor-pointer hover:border-primary-500 hover:bg-primary-50 dark:hover:bg-primary-900/10">
                <input type="file" id="file-input" multiple accept=".xlsx,.xls,.csv,.txt" onchange="handleFiles(this.files)">
                <i class="fas fa-cloud-upload-alt text-4xl text-gray-400 dark:text-dark-muted mb-3"></i>
                <p class="text-sm font-medium mb-1">Drag & Drop file di sini</p>
                <p class="text-xs text-gray-500 dark:text-dark-muted mb-3">atau klik untuk memilih file</p>
                <button onclick="document.getElementById('file-input').click()" class="px-4 py-2 bg-primary-600 text-white rounded-lg text-sm font-medium hover:bg-primary-700 transition">
                    <i class="fas fa-folder-open mr-2"></i>Pilih File
                </button>
                <p class="text-xs text-gray-400 dark:text-dark-muted mt-3">Mendukung: XLSX, XLS, CSV, TXT</p>
            </div>
            <div id="progress-container" class="hidden mt-4">
                <div class="flex justify-between text-xs mb-1">
                    <span id="progress-text">Memproses...</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="w-full bg-gray-200 dark:bg-dark-border rounded-full h-2">
                    <div id="progress-bar" class="progress-bar bg-primary-600 h-2 rounded-full" style="width: 0%"></div>
                </div>
            </div>
            <div id="stats-bar" class="hidden mt-4 flex flex-wrap gap-3">
                <div class="px-3 py-1.5 bg-blue-50 dark:bg-blue-900/20 text-blue-700 dark:text-blue-300 rounded-lg text-xs font-medium">
                    <i class="fas fa-file mr-1"></i><span id="stat-files">0</span> File
                </div>
                <div class="px-3 py-1.5 bg-green-50 dark:bg-green-900/20 text-green-700 dark:text-green-300 rounded-lg text-xs font-medium">
                    <i class="fas fa-check mr-1"></i><span id="stat-filtered">0</span> Data Lolos
                </div>
                <div class="px-3 py-1.5 bg-gray-100 dark:bg-dark-border text-gray-600 dark:text-dark-muted rounded-lg text-xs font-medium">
                    <i class="fas fa-database mr-1"></i><span id="stat-total">0</span> Total
                </div>
            </div>
        </section>

        <section id="toolbar" class="hidden bg-white dark:bg-dark-card rounded-xl shadow-sm border dark:border-dark-border p-4 flex flex-wrap items-center gap-3">
            <div class="relative flex-1 min-w-[200px]">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                <input type="text" id="search-input" placeholder="Cari data..." oninput="debounceSearch()" 
                    class="w-full pl-9 pr-4 py-2 rounded-lg border dark:border-dark-border bg-gray-50 dark:bg-dark-bg text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 transition">
            </div>
            <div class="flex gap-2">
                <button onclick="copyAllToClipboard()" class="px-3 py-2 bg-gray-100 dark:bg-dark-border rounded-lg text-sm hover:bg-gray-200 dark:hover:bg-gray-700 transition" title="Copy Semua">
                    <i class="fas fa-copy mr-1"></i>Copy All
                </button>
                <div class="relative group">
                    <button class="px-3 py-2 bg-primary-600 text-white rounded-lg text-sm hover:bg-primary-700 transition">
                        <i class="fas fa-download mr-1"></i>Export
                    </button>
                    <div class="absolute right-0 mt-1 w-32 bg-white dark:bg-dark-card rounded-lg shadow-lg border dark:border-dark-border hidden group-hover:block z-10">
                        <button onclick="exportData('xlsx')" class="w-full text-left px-3 py-2 text-sm hover:bg-gray-50 dark:hover:bg-dark-border rounded-t-lg">XLSX</button>
                        <button onclick="exportData('csv')" class="w-full text-left px-3 py-2 text-sm hover:bg-gray-50 dark:hover:bg-dark-border">CSV</button>
                        <button onclick="exportData('txt')" class="w-full text-left px-3 py-2 text-sm hover:bg-gray-50 dark:hover:bg-dark-border rounded-b-lg">TXT</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="data-section" class="hidden">
            <div class="bg-white dark:bg-dark-card rounded-xl shadow-sm border dark:border-dark-border overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-gray-50 dark:bg-dark-border text-gray-600 dark:text-dark-muted uppercase text-xs font-semibold">
                            <tr>
                                <th class="px-4 py-3 text-left w-10">#</th>
                                <th class="px-4 py-3 text-left cursor-pointer select-none hover:text-primary-600" onclick="sortTable('lokasi')">
                                    Lokasi <i class="fas fa-sort sort-icon ml-1"></i>
                                </th>
                                <th class="px-4 py-3 text-left cursor-pointer select-none hover:text-primary-600" onclick="sortTable('nik')">
                                    NIK <i class="fas fa-sort sort-icon ml-1"></i>
                                </th>
                                <th class="px-4 py-3 text-left cursor-pointer select-none hover:text-primary-600" onclick="sortTable('kelamin')">
                                    Kelamin <i class="fas fa-sort sort-icon ml-1"></i>
                                </th>
                                <th class="px-4 py-3 text-left cursor-pointer select-none hover:text-primary-600" onclick="sortTable('tgl_lahir')">
                                    Tgl Lahir <i class="fas fa-sort sort-icon ml-1"></i>
                                </th>
                                <th class="px-4 py-3 text-left cursor-pointer select-none hover:text-primary-600" onclick="sortTable('kartuLabel')">
                                    Kartu <i class="fas fa-sort sort-icon ml-1"></i>
                                </th>
                                <th class="px-4 py-3 text-left cursor-pointer select-none hover:text-primary-600" onclick="sortTable('saldo')">
                                    Saldo <i class="fas fa-sort sort-icon ml-1"></i>
                                </th>
                                <th class="px-4 py-3 text-left cursor-pointer select-none hover:text-primary-600" onclick="sortTable('perusahaan')">
                                    Perusahaan <i class="fas fa-sort sort-icon ml-1"></i>
                                </th>
                                <th class="px-4 py-3 text-left">Kode</th>
                                <th class="px-4 py-3 text-left">Password</th>
                                <th class="px-4 py-3 text-left cursor-pointer select-none hover:text-primary-600" onclick="sortTable('kpj')">
                                    KPJ <i class="fas fa-sort sort-icon ml-1"></i>
                                </th>
                                <th class="px-4 py-3 text-left cursor-pointer select-none hover:text-primary-600" onclick="sortTable('nama_oss')">
                                    Nama OSS <i class="fas fa-sort sort-icon ml-1"></i>
                                </th>
                                <th class="px-4 py-3 text-center w-24">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="data-body" class="divide-y divide-gray-100 dark:divide-dark-border">
                        </tbody>
                    </table>
                </div>
                <div id="empty-state" class="hidden py-12 text-center">
                    <i class="fas fa-inbox text-4xl text-gray-300 dark:text-dark-border mb-3"></i>
                    <p class="text-gray-500 dark:text-dark-muted text-sm">Tidak ada data yang cocok</p>
                </div>
            </div>
        </section>
    </main>

    <div id="edit-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-dark-card rounded-xl shadow-2xl max-w-md w-full p-6 fade-in">
            <h3 class="text-lg font-bold mb-4">Edit Data</h3>
            <div id="edit-form" class="space-y-3 max-h-[70vh] overflow-y-auto pr-2">
            </div>
            <div class="flex gap-2 mt-4 pt-4 border-t dark:border-dark-border">
                <button onclick="closeEditModal()" class="flex-1 px-4 py-2 rounded-lg border dark:border-dark-border hover:bg-gray-50 dark:hover:bg-dark-border transition">Batal</button>
                <button onclick="saveEdit()" class="flex-1 px-4 py-2 rounded-lg bg-primary-600 text-white hover:bg-primary-700 transition">Simpan</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== STATE ====================
        let allData = [];
        let filteredData = [];
        let currentSort = { column: null, direction: 'asc' };
        let editingIndex = null;
        const STORAGE_KEY = 'data_filter_app_v1';
        const DEBOUNCE_DELAY = 300;
        let searchTimeout = null;

        // ==================== INIT ====================
        document.addEventListener('DOMContentLoaded', () => {
            loadFromStorage();
            setupDragDrop();
            applyDarkMode();
        });

        function applyDarkMode() {
            const saved = localStorage.getItem('dark_mode');
            if (saved === 'true') document.documentElement.classList.add('dark');
            else if (saved === 'false') document.documentElement.classList.remove('dark');
            else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.classList.add('dark');
            }
        }

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('dark_mode', isDark);
        }

        // ==================== STORAGE ====================
        function saveToStorage() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
            } catch (e) {
                console.warn('LocalStorage penuh atau tidak tersedia');
            }
        }

        function loadFromStorage() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    allData = JSON.parse(saved);
                    applyFilter();
                    showToast('Data berhasil dipulihkan dari penyimpanan lokal', 'success');
                }
            } catch (e) {
                console.error('Gagal memuat dari LocalStorage', e);
            }
        }

        function clearAllData() {
            if (!allData.length) return;
            if (!confirm('Hapus semua data? Tindakan ini tidak dapat dibatalkan.')) return;
            allData = [];
            filteredData = [];
            localStorage.removeItem(STORAGE_KEY);
            renderTable();
            updateStats();
            showToast('Semua data telah dihapus', 'info');
        }

        // ==================== DRAG & DROP ====================
        function setupDragDrop() {
            const zone = document.getElementById('drop-zone');
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
                zone.addEventListener(evt, preventDefaults, false);
            });
            function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }
            zone.addEventListener('dragenter', () => zone.classList.add('drag-active'));
            zone.addEventListener('dragleave', () => zone.classList.remove('drag-active'));
            zone.addEventListener('drop', (e) => {
                zone.classList.remove('drag-active');
                handleFiles(e.dataTransfer.files);
            });
        }

        // ==================== FILE PROCESSING ====================
        async function handleFiles(fileList) {
            const files = Array.from(fileList).filter(f => {
                const ext = f.name.split('.').pop().toLowerCase();
                return ['xlsx','xls','csv','txt'].includes(ext);
            });
            if (!files.length) { showToast('Tidak ada file yang valid', 'error'); return; }

            showProgress(true);
            let processed = 0;
            const total = files.length;

            for (let i = 0; i < files.length; i++) {
                try {
                    await processFile(files[i]);
                } catch (e) {
                    console.error('Error processing', files[i].name, e);
                    showToast('Error: ' + files[i].name, 'error');
                }
                processed++;
                updateProgress(Math.round((processed / total) * 100));
            }

            applyFilter();
            saveToStorage();
            showProgress(false);
            showToast('Berhasil memproses ' + processed + ' file', 'success');
        }

        function showProgress(show) {
            const container = document.getElementById('progress-container');
            if (show) { container.classList.remove('hidden'); updateProgress(0); }
            else { setTimeout(() => container.classList.add('hidden'), 500); }
        }

        function updateProgress(percent) {
            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('progress-percent').textContent = percent + '%';
            document.getElementById('progress-text').textContent = percent < 100 ? 'Memproses file...' : 'Selesai!';
        }

        async function processFile(file) {
            const ext = file.name.split('.').pop().toLowerCase();
            const buffer = await file.arrayBuffer();
            let rows = [];

            if (ext === 'xlsx' || ext === 'xls') {
                const workbook = XLSX.read(buffer, { type: 'array', cellDates: true });
                workbook.SheetNames.forEach(sheetName => {
                    const sheet = workbook.Sheets[sheetName];
                    const data = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
                    rows.push.apply(rows, parseRows(data));
                });
            } else if (ext === 'csv' || ext === 'txt') {
                const text = new TextDecoder().decode(buffer);
                rows = parseCSV(text);
            }

            const newData = rows.map(r => transformRow(r)).filter(r => r !== null);
            allData.push.apply(allData, newData);
        }

        function parseRows(data) {
            if (!data || data.length < 2) return [];
            const headers = data[0].map(h => String(h || '').trim().toUpperCase());
            const rows = [];
            for (let i = 1; i < data.length; i++) {
                const row = data[i];
                if (!row || row.every(c => !c)) continue;
                const obj = {};
                headers.forEach((h, idx) => { obj[h] = row[idx] !== undefined ? row[idx] : ''; });
                rows.push(obj);
            }
            return rows;
        }

        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            if (!lines.length) return [];
            const headers = lines[0].split(',').map(h => h.trim().replace(/^["']|["']$/g, '').toUpperCase());
            const rows = [];
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const values = parseCSVLine(lines[i]);
                const obj = {};
                headers.forEach((h, idx) => { obj[h] = values[idx] !== undefined ? values[idx] : ''; });
                rows.push(obj);
            }
            return rows;
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    if (inQuotes && line[i+1] === '"') { current += '"'; i++; }
                    else { inQuotes = !inQuotes; }
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result.map(v => v.replace(/^["']|["']$/g, ''));
        }

        // ==================== TRANSFORM & FILTER ====================
        function transformRow(row) {
            const get = function(keys) {
                for (let k = 0; k < keys.length; k++) {
                    const val = row[keys[k]];
                    if (val !== undefined && val !== null && String(val).trim() !== '') return String(val).trim();
                }
                return '';
            };

            const nik = get(['NIK']);
            const kpj = get(['KPJ']);
            const nama_oss = get(['NAMA_OSS']);
            const nama_dpt = get(['NAMA_DPT']);
            const tgl_lahir = get(['TANGGAL_LAHIR']);
            const kelamin = get(['KELAMIN']);
            const notif = get(['NOTIF']);
            const dpt_status = get(['DPT_STATUS']);
            const pesan = get(['PESAN_PENGKINIAN']);
            const saldoRaw = get(['SALDO']);
            const jml_kartuRaw = get(['JML_KARTU']);
            const kab = get(['KABUPATEN']);
            const kec = get(['KECAMATAN']);
            const kel = get(['KELURAHAN']);
            const status_akun = get(['STATUS_AKUN']);
            const perusahaan = get(['PERUSAHAAN', 'NAMA_DEWA', 'NAMA_OSS']);
            const alamat = get(['ALAMAT']);

            const saldo = parseFloat(String(saldoRaw).replace(/[^0-9.-]/g, '')) || 0;
            const jml_kartu = parseInt(String(jml_kartuRaw).replace(/[^0-9]/g, '')) || 0;

            const statusNorm = status_akun.toUpperCase().replace(/_/g, ' ').trim();
            const pesanNorm = pesan.toUpperCase().replace(/_/g, ' ').trim();

            const statusMatch = statusNorm === 'BELUM TERDAFTAR';
            const pesanMatch = pesanNorm === 'LAYAK';
            const saldoMatch = saldo >= 1000000;

            if (!statusMatch || !pesanMatch || !saldoMatch) return null;

            const lokasi = [kab, kec, kel].filter(Boolean).join(', ');
            const kartuLabel = jml_kartu <= 1 ? 'TUNGGAL' : 'SENSOR';

            return {
                id: Date.now() + Math.random().toString(36).substr(2, 9),
                nik: nik, kpj: kpj, nama_oss: nama_oss, nama_dpt: nama_dpt,
                tgl_lahir: tgl_lahir, kelamin: kelamin, notif: notif,
                dpt_status: dpt_status, pesan_pengkinian: pesan, saldo: saldo, jml_kartu: jml_kartu,
                kabupaten: kab, kecamatan: kec, kelurahan: kel,
                status_akun: status_akun, perusahaan: perusahaan, alamat: alamat,
                lokasi: lokasi, kartuLabel: kartuLabel,
                kode: 'N/A 01-', password: 'Qwer123@'
            };
        }

        function applyFilter() {
            const q = (document.getElementById('search-input') && document.getElementById('search-input').value) || '';
            const ql = q.toLowerCase();
            filteredData = allData.filter(function(d) {
                if (!ql) return true;
                const hay = (d.nik + ' ' + d.kpj + ' ' + d.nama_oss + ' ' + d.lokasi + ' ' + d.kelamin + ' ' + d.perusahaan).toLowerCase();
                return hay.indexOf(ql) !== -1;
            });
            renderTable();
            updateStats();
        }

        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(applyFilter, DEBOUNCE_DELAY);
        }

        // ==================== RENDER ====================
        function renderTable() {
            const tbody = document.getElementById('data-body');
            const empty = document.getElementById('empty-state');
            const toolbar = document.getElementById('toolbar');
            const section = document.getElementById('data-section');
            const stats = document.getElementById('stats-bar');

            if (!allData.length) {
                tbody.innerHTML = '';
                empty.classList.add('hidden');
                toolbar.classList.add('hidden');
                section.classList.add('hidden');
                stats.classList.add('hidden');
                return;
            }

            section.classList.remove('hidden');
            toolbar.classList.remove('hidden');
            stats.classList.remove('hidden');

            if (!filteredData.length) {
                tbody.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');

            const fmtSaldo = function(n) { return 'Rp ' + n.toLocaleString('id-ID'); };
            let html = '';
            for (let i = 0; i < filteredData.length; i++) {
                const d = filteredData[i];
                const delay = (i * 0.02).toFixed(3);
                const kartuClass = d.kartuLabel === 'TUNGGAL' 
                    ? 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-300' 
                    : 'bg-orange-100 text-orange-700 dark:bg-orange-900/30 dark:text-orange-300';
                html += '<tr class="row-highlight transition fade-in" style="animation-delay: ' + delay + 's">' +
                    '<td class="px-4 py-3 text-gray-400 text-xs">' + (i + 1) + '</td>' +
                    '<td class="px-4 py-3"><div class="text-xs font-semibold text-primary-600 dark:text-primary-400">*' + esc(d.lokasi) + '*</div></td>' +
                    '<td class="px-4 py-3 font-mono text-xs truncate-custom" title="' + esc(d.nik) + '">' + esc(d.nik) + '</td>' +
                    '<td class="px-4 py-3 text-xs">' + esc(d.kelamin) + '</td>' +
                    '<td class="px-4 py-3 text-xs whitespace-nowrap">' + esc(d.tgl_lahir) + '</td>' +
                    '<td class="px-4 py-3"><span class="px-2 py-0.5 rounded text-xs font-medium ' + kartuClass + '">' + d.kartuLabel + '</span></td>' +
                    '<td class="px-4 py-3 text-xs font-semibold">' + fmtSaldo(d.saldo) + '</td>' +
                    '<td class="px-4 py-3 text-xs truncate-custom" title="' + esc(d.perusahaan) + '">' + esc(d.perusahaan || '-') + '</td>' +
                    '<td class="px-4 py-3 text-xs font-mono text-gray-500">' + esc(d.kode) + '</td>' +
                    '<td class="px-4 py-3 text-xs font-mono text-gray-500">' + esc(d.password) + '</td>' +
                    '<td class="px-4 py-3 text-xs font-mono truncate-custom" title="' + esc(d.kpj) + '">' + esc(d.kpj) + '</td>' +
                    '<td class="px-4 py-3 text-xs truncate-custom" title="' + esc(d.nama_oss) + '">' + esc(d.nama_oss) + '</td>' +
                    '<td class="px-4 py-3 text-center">' +
                        '<div class="flex items-center justify-center gap-1">' +
                            '<button onclick="copyRow(' + i + ')" class="p-1.5 text-gray-400 hover:text-primary-600 transition" title="Copy"><i class="fas fa-copy text-xs"></i></button>' +
                            '<button onclick="editRow(' + i + ')" class="p-1.5 text-gray-400 hover:text-yellow-600 transition" title="Edit"><i class="fas fa-edit text-xs"></i></button>' +
                            '<button onclick="deleteRow(' + i + ')" class="p-1.5 text-gray-400 hover:text-red-500 transition" title="Hapus"><i class="fas fa-trash text-xs"></i></button>' +
                        '</div>' +
                    '</td>' +
                '</tr>';
            }
            tbody.innerHTML = html;
        }

        function esc(s) {
            if (!s) return '';
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function updateStats() {
            document.getElementById('stat-files').textContent = '—';
            document.getElementById('stat-filtered').textContent = filteredData.length.toLocaleString('id-ID');
            document.getElementById('stat-total').textContent = allData.length.toLocaleString('id-ID');
        }

        // ==================== SORT ====================
        function sortTable(column) {
            if (currentSort.column === column) {
                currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort = { column: column, direction: 'asc' };
            }

            filteredData.sort(function(a, b) {
                let va = a[column] || '';
                let vb = b[column] || '';
                if (column === 'saldo' || column === 'jml_kartu') {
                    va = parseFloat(va) || 0;
                    vb = parseFloat(vb) || 0;
                } else {
                    va = String(va).toLowerCase();
                    vb = String(vb).toLowerCase();
                }
                if (va < vb) return currentSort.direction === 'asc' ? -1 : 1;
                if (va > vb) return currentSort.direction === 'asc' ? 1 : -1;
                return 0;
            });

            renderTable();
        }

        // ==================== COPY ====================
        function formatRowText(d) {
            return '*'+d.lokasi+'*\n\n'+d.nik+'\n'+d.kelamin+'\n'+d.tgl_lahir+'\n\n'+d.kartuLabel+'\n'+d.saldo.toLocaleString('id-ID')+'\n'+(d.perusahaan || '-')+'\n'+d.kode+'\n'+d.password+'\n'+d.kpj+'\n'+d.nama_oss;
        }

        async function copyRow(index) {
            const d = filteredData[index];
            const text = formatRowText(d);
            try {
                await navigator.clipboard.writeText(text);
                showToast('Data berhasil disalin', 'success');
            } catch (e) {
                fallbackCopy(text);
            }
        }

        async function copyAllToClipboard() {
            if (!filteredData.length) return;
            const parts = [];
            for (let i = 0; i < filteredData.length; i++) {
                parts.push(formatRowText(filteredData[i]));
            }
            const text = parts.join('\n\n---\n\n');
            try {
                await navigator.clipboard.writeText(text);
                showToast(filteredData.length + ' data berhasil disalin', 'success');
            } catch (e) {
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showToast('Data berhasil disalin', 'success');
        }

        // ==================== DELETE ====================
        function deleteRow(index) {
            if (!confirm('Hapus data ini?')) return;
            const item = filteredData[index];
            const realIndex = allData.findIndex(function(d) { return d.id === item.id; });
            if (realIndex > -1) allData.splice(realIndex, 1);
            saveToStorage();
            applyFilter();
            showToast('Data dihapus', 'info');
        }

        // ==================== EDIT ====================
        function editRow(index) {
            editingIndex = index;
            const d = filteredData[index];
            const fields = [
                { key: 'nik', label: 'NIK', type: 'text' },
                { key: 'kpj', label: 'KPJ', type: 'text' },
                { key: 'nama_oss', label: 'Nama OSS', type: 'text' },
                { key: 'tgl_lahir', label: 'Tanggal Lahir', type: 'text' },
                { key: 'kelamin', label: 'Kelamin', type: 'text' },
                { key: 'saldo', label: 'Saldo', type: 'number' },
                { key: 'jml_kartu', label: 'Jumlah Kartu', type: 'number' },
                { key: 'kabupaten', label: 'Kabupaten', type: 'text' },
                { key: 'kecamatan', label: 'Kecamatan', type: 'text' },
                { key: 'kelurahan', label: 'Kelurahan', type: 'text' },
                { key: 'perusahaan', label: 'Perusahaan', type: 'text' },
                { key: 'kode', label: 'Kode', type: 'text' },
                { key: 'password', label: 'Password', type: 'text' },
            ];

            const form = document.getElementById('edit-form');
            let html = '';
            for (let i = 0; i < fields.length; i++) {
                const f = fields[i];
                const val = d[f.key] !== undefined ? d[f.key] : '';
                html += '<div>' +
                    '<label class="block text-xs font-medium text-gray-600 dark:text-dark-muted mb-1">' + f.label + '</label>' +
                    '<input type="' + f.type + '" id="edit-' + f.key + '" value="' + esc(String(val)) + '"' +
                    ' class="w-full px-3 py-2 rounded-lg border dark:border-dark-border bg-gray-50 dark:bg-dark-bg text-sm focus:outline-none focus:ring-2 focus:ring-primary-500">' +
                '</div>';
            }
            form.innerHTML = html;
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function closeEditModal() {
            document.getElementById('edit-modal').classList.add('hidden');
            editingIndex = null;
        }

        function saveEdit() {
            if (editingIndex === null) return;
            const item = filteredData[editingIndex];
            const realIndex = allData.findIndex(function(d) { return d.id === item.id; });
            if (realIndex === -1) return;

            const keys = ['nik','kpj','nama_oss','tgl_lahir','kelamin','saldo','jml_kartu','kabupaten','kecamatan','kelurahan','perusahaan','kode','password'];
            for (let i = 0; i < keys.length; i++) {
                const k = keys[i];
                const el = document.getElementById('edit-' + k);
                if (!el) continue;
                let val = el.value;
                if (k === 'saldo' || k === 'jml_kartu') val = parseFloat(val) || 0;
                allData[realIndex][k] = val;
            }

            const d = allData[realIndex];
            d.lokasi = [d.kabupaten, d.kecamatan, d.kelurahan].filter(Boolean).join(', ');
            d.kartuLabel = d.jml_kartu <= 1 ? 'TUNGGAL' : 'SENSOR';

            saveToStorage();
            applyFilter();
            closeEditModal();
            showToast('Data berhasil diperbarui', 'success');
        }

        // ==================== EXPORT ====================
        function exportData(format) {
            if (!filteredData.length) { showToast('Tidak ada data untuk diekspor', 'error'); return; }

            if (format === 'txt') {
                const parts = [];
                for (let i = 0; i < filteredData.length; i++) {
                    parts.push(formatRowText(filteredData[i]));
                }
                const text = parts.join('\n\n---\n\n');
                downloadFile(text, 'data_filter.txt', 'text/plain');
                showToast('Export TXT berhasil', 'success');
                return;
            }

            const exportRows = filteredData.map(function(d) {
                return {
                    'LOKASI': d.lokasi,
                    'NIK': d.nik,
                    'KELAMIN': d.kelamin,
                    'TANGGAL_LAHIR': d.tgl_lahir,
                    'KARTU': d.kartuLabel,
                    'SALDO': d.saldo,
                    'PERUSAHAAN': d.perusahaan,
                    'KODE': d.kode,
                    'PASSWORD': d.password,
                    'KPJ': d.kpj,
                    'NAMA_OSS': d.nama_oss
                };
            });

            if (format === 'csv') {
                const headers = Object.keys(exportRows[0]);
                const lines = [headers.join(',')];
                for (let i = 0; i < exportRows.length; i++) {
                    const r = exportRows[i];
                    const vals = [];
                    for (let j = 0; j < headers.length; j++) {
                        const v = r[headers[j]] || '';
                        vals.push(v.toString().indexOf(',') !== -1 ? '"' + v + '"' : v);
                    }
                    lines.push(vals.join(','));
                }
                const csv = lines.join('\n');
                downloadFile('\uFEFF' + csv, 'data_filter.csv', 'text/csv;charset=utf-8');
                showToast('Export CSV berhasil', 'success');
            } else if (format === 'xlsx') {
                const ws = XLSX.utils.json_to_sheet(exportRows);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, 'Data Filter');
                XLSX.writeFile(wb, 'data_filter.xlsx');
                showToast('Export XLSX berhasil', 'success');
            }
        }

        function downloadFile(content, filename, mimeType) {
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // ==================== TOAST ====================
        function showToast(message, type) {
            const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500' };
            const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', info: 'fa-info-circle' };
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast flex items-center gap-2 px-4 py-3 rounded-lg text-white text-sm shadow-lg ' + colors[type];
            toast.innerHTML = '<i class="fas ' + icons[type] + '"></i><span>' + message + '</span>';
            container.appendChild(toast);
            setTimeout(function() { toast.remove(); }, 3000);
        }
    </script>
</body>
</html>
