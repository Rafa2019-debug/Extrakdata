<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WEB EKSTRAK DATA XLSX</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #f1f5f9;
  --surface: #ffffff;
  --surface-2: #f8fafc;
  --text: #0f172a;
  --text-secondary: #475569;
  --border: #cbd5e1;
  --primary: #0ea5e9;
  --primary-dark: #0284c7;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
  --radius: 12px;
  --radius-sm: 8px;
  --item-height: 340px;
}

[data-theme="dark"] {
  --bg: #0f172a;
  --surface: #1e293b;
  --surface-2: #334155;
  --text: #f1f5f9;
  --text-secondary: #94a3b8;
  --border: #334155;
  --primary: #38bdf8;
  --primary-dark: #0ea5e9;
  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.3), 0 2px 4px -2px rgb(0 0 0 / 0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
}

.app-header {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  padding: 1rem;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}

.app-header h1 {
  font-size: 1.25rem;
  font-weight: 700;
  text-align: center;
  letter-spacing: 0.5px;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0.75rem;
  padding: 1rem;
  max-width: 1200px;
  margin: 0 auto;
}

@media (min-width: 640px) {
  .stats-grid { grid-template-columns: repeat(3, 1fr); }
}

@media (min-width: 1024px) {
  .stats-grid { grid-template-columns: repeat(5, 1fr); }
}

.stat-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 1rem;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  text-align: center;
  transition: transform 0.2s;
}

.stat-card:hover { transform: translateY(-2px); }

.stat-value {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--primary);
  line-height: 1;
  margin-bottom: 0.25rem;
}

.stat-label {
  font-size: 0.75rem;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.upload-section {
  padding: 0 1rem 1rem;
  max-width: 1200px;
  margin: 0 auto;
}

.upload-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 2rem 1rem;
  text-align: center;
  background: var(--surface);
  transition: all 0.3s;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.upload-zone:hover, .upload-zone.dragover {
  border-color: var(--primary);
  background: var(--surface-2);
}

.upload-zone input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
}

.upload-icon {
  font-size: 2.5rem;
  margin-bottom: 0.5rem;
  opacity: 0.5;
}

.upload-text {
  font-weight: 600;
  color: var(--text-secondary);
}

.upload-subtext {
  font-size: 0.875rem;
  color: var(--text-secondary);
  margin-top: 0.25rem;
}

.progress-container {
  margin-top: 1rem;
  display: none;
}

.progress-container.active { display: block; }

.progress-bar-bg {
  height: 8px;
  background: var(--bg);
  border-radius: 4px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--primary-dark));
  width: 0%;
  transition: width 0.3s;
  border-radius: 4px;
}

.progress-text {
  font-size: 0.875rem;
  color: var(--text-secondary);
  margin-top: 0.5rem;
  text-align: center;
}

.loading-overlay {
  position: fixed;
  inset: 0;
  background: rgb(0 0 0 / 0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(4px);
}

.loading-overlay.active { display: flex; }

.spinner {
  width: 48px;
  height: 48px;
  border: 4px solid var(--surface);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.controls-section {
  padding: 0 1rem 1rem;
  max-width: 1200px;
  margin: 0 auto;
}

.controls-grid {
  display: grid;
  gap: 0.75rem;
  background: var(--surface);
  padding: 1rem;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}

@media (min-width: 768px) {
  .controls-grid {
    grid-template-columns: repeat(4, 1fr);
    align-items: end;
  }
  .controls-grid .control-group:last-child {
    grid-column: 1 / -1;
  }
}

.control-group {
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
}

.control-label {
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
}

.control-input, .control-select {
  padding: 0.5rem 0.75rem;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 0.875rem;
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
}

.control-input:focus, .control-select:focus {
  border-color: var(--primary);
}

.search-box { position: relative; }
.search-box input { width: 100%; padding-left: 2.5rem; }
.search-icon {
  position: absolute;
  left: 0.75rem;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0.5;
  pointer-events: none;
}

.actions-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-top: 0.75rem;
  padding-top: 0.75rem;
  border-top: 1px solid var(--border);
  align-items: center;
}

.btn {
  padding: 0.5rem 1rem;
  border-radius: var(--radius-sm);
  border: none;
  font-size: 0.875rem;
  font-weight: 600;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  transition: all 0.2s;
  white-space: nowrap;
  line-height: 1;
}

.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-success { background: var(--success); color: white; }
.btn-warning { background: var(--warning); color: white; }
.btn-danger { background: var(--danger); color: white; }
.btn-secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--border); }
.btn-sm { padding: 0.375rem 0.625rem; font-size: 0.75rem; }

.results-section {
  padding: 0 1rem 2rem;
  max-width: 1200px;
  margin: 0 auto;
}

.results-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1rem;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.results-title {
  font-size: 1rem;
  font-weight: 700;
}

.results-count {
  font-size: 0.875rem;
  color: var(--text-secondary);
}

.results-container {
  height: calc(100vh - 420px);
  min-height: 400px;
  overflow-y: auto;
  border-radius: var(--radius);
  background: var(--surface);
  border: 1px solid var(--border);
  position: relative;
}

@media (max-width: 640px) {
  .results-container { height: calc(100vh - 400px); min-height: 300px; }
}

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 300px;
  color: var(--text-secondary);
  text-align: center;
  padding: 2rem;
}

.empty-state-icon {
  font-size: 3rem;
  opacity: 0.3;
  margin-bottom: 1rem;
}

#virtualWrapper { position: relative; }

.data-card {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0.875rem;
  position: absolute;
  left: 0;
  right: 0;
  transition: background 0.2s;
  overflow: hidden;
}

.data-card:hover { background: var(--surface-2); }
.data-card.selected {
  background: rgb(14 165 233 / 0.08);
  border-left: 3px solid var(--primary);
  padding-left: calc(0.875rem - 3px);
}

.card-header {
  margin-bottom: 0.625rem;
  padding-bottom: 0.625rem;
  border-bottom: 2px solid var(--primary);
}

.card-header h3 {
  font-size: 0.875rem;
  font-weight: 700;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  line-height: 1.3;
}

.card-body {
  display: grid;
  gap: 0.25rem;
  font-size: 0.8125rem;
}

.card-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1rem;
  min-height: 20px;
}

.card-label {
  color: var(--text-secondary);
  font-weight: 500;
  flex-shrink: 0;
}

.card-value {
  font-weight: 600;
  text-align: right;
  word-break: break-all;
}

.card-value.saldo {
  color: var(--success);
  font-size: 0.9375rem;
}

.badge {
  display: inline-block;
  padding: 0.2rem 0.625rem;
  border-radius: 9999px;
  font-size: 0.6875rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  width: fit-content;
  margin: 0.15rem 0;
}

.badge-tunggal { background: rgb(16 185 129 / 0.15); color: var(--success); }
.badge-sensor { background: rgb(245 158 11 / 0.15); color: #d97706; }

.token-line {
  font-family: 'Courier New', monospace;
  font-weight: 700;
  color: var(--warning);
  margin: 0.15rem 0;
  font-size: 0.8125rem;
}

.card-actions {
  display: flex;
  gap: 0.4rem;
  margin-top: 0.625rem;
  padding-top: 0.625rem;
  border-top: 1px solid var(--border);
  flex-wrap: nowrap;
  overflow-x: auto;
}

.card-actions .btn { padding: 0.25rem 0.5rem; font-size: 0.7rem; }

.card-actions label {
  display: flex;
  align-items: center;
  gap: 0.25rem;
  font-size: 0.7rem;
  cursor: pointer;
  white-space: nowrap;
  margin-left: auto;
  color: var(--text-secondary);
}

.card-actions input[type="checkbox"] {
  cursor: pointer;
  width: 14px;
  height: 14px;
  accent-color: var(--primary);
}

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgb(0 0 0 / 0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 2000;
  padding: 1rem;
  backdrop-filter: blur(4px);
}

.modal-overlay.active { display: flex; }

.modal {
  background: var(--surface);
  border-radius: var(--radius);
  width: 100%;
  max-width: 500px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}

.modal-header {
  padding: 1rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.modal-title { font-weight: 700; }

.modal-close {
  background: none;
  border: none;
  font-size: 1.5rem;
  cursor: pointer;
  color: var(--text-secondary);
  line-height: 1;
  padding: 0;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
}

.modal-close:hover { background: var(--bg); }

.modal-body {
  padding: 1rem;
  display: grid;
  gap: 0.75rem;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
}

.form-label {
  font-size: 0.875rem;
  font-weight: 600;
  color: var(--text-secondary);
}

.form-input, .form-select {
  padding: 0.5rem 0.75rem;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 0.875rem;
  outline: none;
  width: 100%;
}

.form-input:focus, .form-select:focus { border-color: var(--primary); }

.modal-footer {
  padding: 1rem;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 0.5rem;
}

.toast-container {
  position: fixed;
  bottom: 1rem;
  right: 1rem;
  z-index: 3000;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  pointer-events: none;
}

.toast {
  background: var(--surface);
  color: var(--text);
  padding: 0.75rem 1rem;
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  font-size: 0.875rem;
  animation: slideIn 0.3s ease;
  max-width: 320px;
  pointer-events: auto;
}

.toast-success { border-left: 4px solid var(--success); }
.toast-error { border-left: 4px solid var(--danger); }

@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.theme-toggle {
  position: fixed;
  bottom: 1rem;
  left: 1rem;
  z-index: 100;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--surface);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 1.25rem;
  transition: all 0.3s;
  color: var(--text);
}

.theme-toggle:hover { transform: scale(1.1); }

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

@media (max-width: 640px) {
  .app-header h1 { font-size: 1rem; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 0.5rem; padding: 0.75rem; }
  .stat-value { font-size: 1.25rem; }
  .controls-grid { padding: 0.75rem; }
  .results-header { flex-direction: column; align-items: flex-start; }
  .card-row { gap: 0.5rem; }
  .card-value { text-align: left; }
}

@media (max-width: 380px) {
  .card-actions .btn { padding: 0.2rem 0.4rem; font-size: 0.65rem; }
}
</style>
</head>
<body>

<header class="app-header">
  <h1>WEB EKSTRAK DATA XLSX</h1>
</header>

<section class="stats-grid">
  <div class="stat-card">
    <div class="stat-value" id="stat-total">0</div>
    <div class="stat-label">Total Data</div>
  </div>
  <div class="stat-card">
    <div class="stat-value" id="stat-filtered">0</div>
    <div class="stat-label">Lolos Filter</div>
  </div>
  <div class="stat-card">
    <div class="stat-value" id="stat-tunggal">0</div>
    <div class="stat-label">Tunggal</div>
  </div>
  <div class="stat-card">
    <div class="stat-value" id="stat-sensor">0</div>
    <div class="stat-label">Sensor</div>
  </div>
  <div class="stat-card">
    <div class="stat-value" id="stat-saldo">0</div>
    <div class="stat-label">Total Saldo</div>
  </div>
</section>

<section class="upload-section">
  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept=".xlsx,.xls" multiple>
    <div class="upload-icon">📁</div>
    <div class="upload-text">Drag & Drop file XLSX di sini</div>
    <div class="upload-subtext">atau klik untuk memilih file (bisa banyak file sekaligus)</div>
  </div>
  <div class="progress-container" id="progressContainer">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressBar"></div>
    </div>
    <div class="progress-text" id="progressText">Membaca file...</div>
  </div>
</section>

<section class="controls-section">
  <div class="controls-grid">
    <div class="control-group">
      <label class="control-label">Kabupaten</label>
      <select class="control-select" id="filterKabupaten"><option value="">Semua Kabupaten</option></select>
    </div>
    <div class="control-group">
      <label class="control-label">Kecamatan</label>
      <select class="control-select" id="filterKecamatan"><option value="">Semua Kecamatan</option></select>
    </div>
    <div class="control-group">
      <label class="control-label">Kelurahan</label>
      <select class="control-select" id="filterKelurahan"><option value="">Semua Kelurahan</option></select>
    </div>
    <div class="control-group">
      <label class="control-label">Urutkan</label>
      <select class="control-select" id="sortSelect">
        <option value="saldo-desc">Saldo Terbesar</option>
        <option value="saldo-asc">Saldo Terkecil</option>
        <option value="nama-asc">Nama A-Z</option>
        <option value="nama-desc">Nama Z-A</option>
      </select>
    </div>
    <div class="control-group">
      <label class="control-label">Pencarian (NIK / KPJ / Nama)</label>
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" class="control-input" id="searchInput" placeholder="Ketik untuk mencari...">
      </div>
    </div>
  </div>

  <div class="actions-bar">
    <button class="btn btn-secondary btn-sm" onclick="selectAll()">✓ Pilih Semua</button>
    <button class="btn btn-danger btn-sm" onclick="deleteSelected()">🗑 Hapus Terpilih</button>
    <button class="btn btn-secondary btn-sm" onclick="copyAll()">📋 Copy Semua</button>
    <button class="btn btn-primary btn-sm" onclick="downloadTXT()">📄 TXT</button>
    <button class="btn btn-primary btn-sm" onclick="downloadCSV()">📊 CSV</button>
    <button class="btn btn-primary btn-sm" onclick="downloadXLSX()">📈 XLSX</button>
    <button class="btn btn-danger btn-sm" onclick="clearAllData()">🗑 Hapus Semua Data</button>
    <span id="selectedCount" style="font-size: 0.875rem; color: var(--text-secondary); margin-left: auto;">0 dipilih</span>
  </div>
</section>

<section class="results-section">
  <div class="results-header">
    <h2 class="results-title">Hasil Filter</h2>
    <span class="results-count" id="resultsCount">0 data ditampilkan</span>
  </div>
  <div class="results-container" id="resultsContainer">
    <div class="empty-state" id="emptyState">
      <div class="empty-state-icon">📂</div>
      <p>Belum ada data. Upload file XLSX untuk memulai.</p>
    </div>
    <div id="virtualWrapper"></div>
  </div>
</section>

<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Edit Data</span>
      <button class="modal-close" onclick="closeEdit()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeEdit()">Batal</button>
      <button class="btn btn-primary" onclick="saveEdit()">Simpan</button>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
</div>

<div class="toast-container" id="toastContainer"></div>

<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>

<script>
// ==================== STATE ====================
const state = {
  items: [],
  filtered: [],
  selected: new Set(),
  filters: {
    kabupaten: '',
    kecamatan: '',
    kelurahan: '',
    search: '',
    sort: 'saldo-desc'
  },
  editingId: null,
  darkMode: false
};

const ITEM_HEIGHT = 340;
const BUFFER = 4;

// ==================== DB (IndexedDB) ====================
const DB_NAME = 'XlsxExtractDB';
const STORE = 'items';
let db = null;

function initDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE)) {
        d.createObjectStore(STORE, { keyPath: 'id' });
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(); };
    req.onerror = (e) => reject(e.target.error);
  });
}

function saveToDB() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    const store = tx.objectStore(STORE);
    store.clear();
    for (const item of state.items) store.put(item);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

function loadFromDB() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readonly');
    const store = tx.objectStore(STORE);
    const req = store.getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

// ==================== UTILS ====================
function showToast(msg, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function setLoading(show) {
  document.getElementById('loadingOverlay').classList.toggle('active', show);
}

function setProgress(percent, text) {
  const container = document.getElementById('progressContainer');
  const bar = document.getElementById('progressBar');
  const txt = document.getElementById('progressText');
  const active = percent > 0 && percent < 100;
  container.classList.toggle('active', active);
  bar.style.width = percent + '%';
  if (text) txt.textContent = text;
}

function formatSaldo(n) {
  return n.toLocaleString('id-ID');
}

function parseSaldo(val) {
  if (typeof val === 'number') return val;
  if (!val) return 0;
  const s = String(val).trim();
  if (s.includes(',') && !s.includes('.')) {
    return parseFloat(s.replace(',', '.')) || 0;
  }
  return parseFloat(s.replace(/\./g, '').replace(',', '.')) || 0;
}

function parseJmlKartu(val) {
  if (typeof val === 'number') return val;
  if (!val) return 0;
  return parseInt(String(val).replace(/\D/g, '')) || 0;
}

function normalizeItem(raw) {
  const get = (keys) => {
    for (const k of keys) {
      if (raw[k] !== undefined && raw[k] !== null && raw[k] !== '') {
        return raw[k];
      }
    }
    return '';
  };

  const item = {
    id: get(['id']) || Math.random().toString(36).slice(2) + Date.now(),
    NIK: String(get(['NIK', 'nik']) || '').trim(),
    KPJ: String(get(['KPJ', 'kpj']) || '').trim(),
    NAMA_OSS: String(get(['NAMA_OSS', 'nama_oss', 'NAMA OSS', 'nama oss']) || '').trim(),
    TANGGAL_LAHIR: String(get(['TANGGAL_LAHIR', 'tanggal_lahir', 'TGL LAHIR', 'TANGGAL LAHIR']) || '').trim(),
    KELAMIN: String(get(['KELAMIN', 'kelamin', 'JENIS KELAMIN']) || '').trim(),
    NOTIF: String(get(['NOTIF', 'notif']) || '').trim(),
    PESAN_PENGKINIAN: String(get(['PESAN_PENGKINIAN', 'pesan_pengkinian', 'PESAN', 'PESAN PENGKINIAN']) || '').trim(),
    SALDO: parseSaldo(get(['SALDO', 'saldo'])),
    JML_KARTU: parseJmlKartu(get(['JML_KARTU', 'jml_kartu', 'JUMLAH KARTU', 'JML KARTU'])),
    KABUPATEN: String(get(['KABUPATEN', 'kabupaten', 'KAB']) || '').trim().toUpperCase(),
    KECAMATAN: String(get(['KECAMATAN', 'kecamatan', 'KEC']) || '').trim().toUpperCase(),
    KELURAHAN: String(get(['KELURAHAN', 'kelurahan', 'KEL']) || '').trim().toUpperCase(),
    STATUS_AKUN: String(get(['STATUS_AKUN', 'status_akun', 'STATUS', 'STATUS AKUN']) || '').trim(),
  };

  const k = item.KELAMIN.toUpperCase();
  if (k === 'L' || k.includes('LAKI')) item.KELAMIN_DISPLAY = 'PRIA';
  else if (k === 'P' || k.includes('PEREMPUAN')) item.KELAMIN_DISPLAY = 'WANITA';
  else item.KELAMIN_DISPLAY = item.KELAMIN || '-';

  item._statusNorm = item.STATUS_AKUN.toUpperCase().replace(/[_\s]/g, '');
  item.KARTU_TYPE = item.JML_KARTU <= 1 ? 'TUNGGAL' : 'SENSOR';
  item.SALDO_FORMAT = formatSaldo(item.SALDO);

  return item;
}

function passesFilter(item) {
  const statusOk = item._statusNorm === 'BELUMTERDAFTAR';
  const pesanOk = item.PESAN_PENGKINIAN.toUpperCase() === 'LAYAK';
  const saldoOk = item.SALDO >= 1000000;
  return statusOk && pesanOk && saldoOk;
}

function formatItemText(item) {
  return `${item.KABUPATEN}, ${item.KECAMATAN}, ${item.KELURAHAN}

${item.NIK}
${item.KELAMIN_DISPLAY}
${item.TANGGAL_LAHIR}

${item.KARTU_TYPE}
${item.SALDO_FORMAT}
PERUSAHAAN
N/A 01-

Qwer123@
${item.KPJ}
${item.NAMA_OSS}`;
}

function copyToClipboard(text) {
  if (navigator.clipboard) {
    return navigator.clipboard.writeText(text);
  }
  return new Promise((resolve) => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    resolve();
  });
}

// ==================== FILE PROCESSING ====================
function readFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

function findHeaderRow(worksheet) {
  const range = XLSX.utils.decode_range(worksheet['!ref']);
  for (let R = range.s.r; R <= Math.min(range.e.r, range.s.r + 20); R++) {
    let hasNIK = false;
    const headers = [];
    for (let C = range.s.c; C <= range.e.c; C++) {
      const cell = worksheet[XLSX.utils.encode_cell({ r: R, c: C })];
      const val = cell ? String(cell.v).toUpperCase().trim() : '';
      headers.push(val);
      if (val === 'NIK') hasNIK = true;
    }
    if (hasNIK) return { row: R, headers };
  }
  return null;
}

function extractSheet(worksheet, headerInfo) {
  const range = XLSX.utils.decode_range(worksheet['!ref']);
  const rows = [];
  for (let R = headerInfo.row + 1; R <= range.e.r; R++) {
    const obj = {};
    let hasData = false;
    for (let C = range.s.c; C <= range.e.c; C++) {
      const header = headerInfo.headers[C - range.s.c] || `COL${C}`;
      const cell = worksheet[XLSX.utils.encode_cell({ r: R, c: C })];
      const val = cell ? cell.v : '';
      obj[header] = val;
      if (val !== '' && val !== null && val !== undefined) hasData = true;
    }
    if (hasData) rows.push(obj);
  }
  return rows;
}

async function processFiles(files) {
  if (!files.length) return;
  if (typeof XLSX === 'undefined') {
    return showToast('SheetJS belum dimuat. Tidak bisa membaca file.', 'error');
  }

  setLoading(true);
  setProgress(0, 'Membaca file...');

  let newItems = [];
  const total = files.length;

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    try {
      const data = await readFile(file);
      const workbook = XLSX.read(new Uint8Array(data), { type: 'array', cellDates: false });

      for (const sheetName of workbook.SheetNames) {
        const ws = workbook.Sheets[sheetName];
        const headerInfo = findHeaderRow(ws);
        if (!headerInfo) continue;

        const rows = extractSheet(ws, headerInfo);
        for (const row of rows) {
          const item = normalizeItem(row);
          if (passesFilter(item)) {
            newItems.push(item);
          }
        }
      }
    } catch (err) {
      console.error('Error reading file:', err);
      showToast(`Gagal membaca ${file.name}`, 'error');
    }
    setProgress(((i + 1) / total) * 100, `Membaca ${file.name}...`);
  }

  // Merge dengan existing, hindari duplikat berdasarkan NIK+KPJ
  const existingKeys = new Set(state.items.map(i => i.NIK + '|' + i.KPJ));
  let added = 0;
  for (const item of newItems) {
    const key = item.NIK + '|' + item.KPJ;
    if (!existingKeys.has(key)) {
      state.items.push(item);
      existingKeys.add(key);
      added++;
    }
  }

  await saveToDB();
  setProgress(0);
  setLoading(false);

  showToast(`${added} data baru berhasil ditambahkan (${state.items.length} total)`);
  applyFilters();
}

// ==================== FILTER & SORT ====================
function applyFilters() {
  let data = [...state.items];

  if (state.filters.kabupaten) {
    data = data.filter(i => i.KABUPATEN === state.filters.kabupaten);
  }
  if (state.filters.kecamatan) {
    data = data.filter(i => i.KECAMATAN === state.filters.kecamatan);
  }
  if (state.filters.kelurahan) {
    data = data.filter(i => i.KELURAHAN === state.filters.kelurahan);
  }
  if (state.filters.search) {
    const q = state.filters.search.toLowerCase();
    data = data.filter(i =>
      i.NIK.toLowerCase().includes(q) ||
      i.KPJ.toLowerCase().includes(q) ||
      i.NAMA_OSS.toLowerCase().includes(q)
    );
  }

  data.sort((a, b) => {
    const kab = a.KABUPATEN.localeCompare(b.KABUPATEN);
    if (kab !== 0) return kab;
    const kec = a.KECAMATAN.localeCompare(b.KECAMATAN);
    if (kec !== 0) return kec;
    const kel = a.KELURAHAN.localeCompare(b.KELURAHAN);
    if (kel !== 0) return kel;

    switch (state.filters.sort) {
      case 'saldo-asc': return a.SALDO - b.SALDO;
      case 'nama-asc': return a.NAMA_OSS.localeCompare(b.NAMA_OSS);
      case 'nama-desc': return b.NAMA_OSS.localeCompare(a.NAMA_OSS);
      default: return b.SALDO - a.SALDO;
    }
  });

  state.filtered = data;
  updateDropdowns();
  updateStats();
  lastStart = -1; lastEnd = -1;
  renderVirtual();
  saveFilters();
}

function updateDropdowns() {
  const base = state.items;
  const kabs = [...new Set(base.map(i => i.KABUPATEN))].filter(Boolean).sort();
  const kecs = [...new Set(base
    .filter(i => !state.filters.kabupaten || i.KABUPATEN === state.filters.kabupaten)
    .map(i => i.KECAMATAN))].filter(Boolean).sort();
  const kels = [...new Set(base
    .filter(i =>
      (!state.filters.kabupaten || i.KABUPATEN === state.filters.kabupaten) &&
      (!state.filters.kecamatan || i.KECAMATAN === state.filters.kecamatan)
    )
    .map(i => i.KELURAHAN))].filter(Boolean).sort();

  populateSelect('filterKabupaten', kabs, state.filters.kabupaten, 'Semua Kabupaten');
  populateSelect('filterKecamatan', kecs, state.filters.kecamatan, 'Semua Kecamatan');
  populateSelect('filterKelurahan', kels, state.filters.kelurahan, 'Semua Kelurahan');
}

function populateSelect(id, options, selected, placeholder) {
  const sel = document.getElementById(id);
  sel.innerHTML = `<option value="">${placeholder}</option>`;
  for (const opt of options) {
    const option = document.createElement('option');
    option.value = opt;
    option.textContent = opt;
    if (opt === selected) option.selected = true;
    sel.appendChild(option);
  }
  if (selected && !options.includes(selected)) {
    sel.value = '';
  }
}

function updateStats() {
  const total = state.items.length;
  const filtered = state.filtered.length;
  const tunggal = state.filtered.filter(i => i.KARTU_TYPE === 'TUNGGAL').length;
  const sensor = state.filtered.filter(i => i.KARTU_TYPE === 'SENSOR').length;
  const saldo = state.filtered.reduce((sum, i) => sum + i.SALDO, 0);

  document.getElementById('stat-total').textContent = total.toLocaleString('id-ID');
  document.getElementById('stat-filtered').textContent = filtered.toLocaleString('id-ID');
  document.getElementById('stat-tunggal').textContent = tunggal.toLocaleString('id-ID');
  document.getElementById('stat-sensor').textContent = sensor.toLocaleString('id-ID');
  document.getElementById('stat-saldo').textContent = formatSaldo(saldo);
  document.getElementById('resultsCount').textContent = `${filtered} data ditampilkan`;
  document.getElementById('selectedCount').textContent = `${state.selected.size} dipilih`;
}

// ==================== VIRTUAL RENDER ====================
let lastStart = -1, lastEnd = -1;

function renderVirtual() {
  const container = document.getElementById('resultsContainer');
  const wrapper = document.getElementById('virtualWrapper');
  const empty = document.getElementById('emptyState');

  if (!state.filtered.length) {
    wrapper.style.display = 'none';
    empty.style.display = 'flex';
    container.style.overflowY = 'hidden';
    return;
  }

  wrapper.style.display = 'block';
  empty.style.display = 'none';
  container.style.overflowY = 'auto';

  const scrollTop = container.scrollTop;
  const viewHeight = container.clientHeight;

  const start = Math.max(0, Math.floor(scrollTop / ITEM_HEIGHT) - BUFFER);
  const end = Math.min(state.filtered.length, Math.ceil((scrollTop + viewHeight) / ITEM_HEIGHT) + BUFFER);

  if (start === lastStart && end === lastEnd) return;
  lastStart = start;
  lastEnd = end;

  wrapper.style.height = `${state.filtered.length * ITEM_HEIGHT}px`;
  wrapper.style.position = 'relative';

  wrapper.innerHTML = '';
  const fragment = document.createDocumentFragment();
  for (let i = start; i < end; i++) {
    const div = document.createElement('div');
    div.innerHTML = renderCardHTML(state.filtered[i], i);
    const card = div.firstElementChild;
    card.style.position = 'absolute';
    card.style.top = `${i * ITEM_HEIGHT}px`;
    card.style.left = '0';
    card.style.right = '0';
    card.style.height = `${ITEM_HEIGHT}px`;
    fragment.appendChild(card);
  }
  wrapper.appendChild(fragment);
}

function renderCardHTML(item, index) {
  const selected = state.selected.has(item.id) ? 'selected' : '';
  return `
  <div class="data-card ${selected}" data-id="${item.id}" data-index="${index}">
    <div class="card-header">
      <h3>${escapeHtml(item.KABUPATEN)}, ${escapeHtml(item.KECAMATAN)}, ${escapeHtml(item.KELURAHAN)}</h3>
    </div>
    <div class="card-body">
      <div class="card-row"><span class="card-label">NIK</span><span class="card-value">${escapeHtml(item.NIK)}</span></div>
      <div class="card-row"><span class="card-label">KELAMIN</span><span class="card-value">${escapeHtml(item.KELAMIN_DISPLAY)}</span></div>
      <div class="card-row"><span class="card-label">TANGGAL LAHIR</span><span class="card-value">${escapeHtml(item.TANGGAL_LAHIR)}</span></div>
      <div style="margin: 0.4rem 0;">
        <span class="badge badge-${item.KARTU_TYPE === 'TUNGGAL' ? 'tunggal' : 'sensor'}">${item.KARTU_TYPE}</span>
      </div>
      <div class="card-row"><span class="card-label">SALDO</span><span class="card-value saldo">Rp ${item.SALDO_FORMAT}</span></div>
      <div class="card-row"><span class="card-label">PERUSAHAAN</span><span class="card-value">N/A 01-</span></div>
      <div class="token-line">Qwer123@</div>
      <div class="card-row"><span class="card-label">KPJ</span><span class="card-value">${escapeHtml(item.KPJ)}</span></div>
      <div class="card-row"><span class="card-label">NAMA OSS</span><span class="card-value">${escapeHtml(item.NAMA_OSS)}</span></div>
    </div>
    <div class="card-actions">
      <button class="btn btn-primary btn-sm btn-copy" data-id="${item.id}">📋 Copy</button>
      <button class="btn btn-warning btn-sm btn-edit" data-id="${item.id}">✏️ Edit</button>
      <button class="btn btn-danger btn-sm btn-delete" data-id="${item.id}">🗑 Hapus</button>
      <label>
        <input type="checkbox" class="select-cb" data-id="${item.id}" ${state.selected.has(item.id) ? 'checked' : ''}>
        Pilih
      </label>
    </div>
  </div>`;
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function editItem(id) {

  state.editingId = id;

  const fields = [
    { key: 'NIK', label: 'NIK', type: 'text' },

  `).join('');

function saveEdit() {
  const item = state.items.find(i => i.id === state.editingId);
  if (!item) return;

  const fields = ['NIK', 'KPJ', 'NAMA_OSS', 'TANGGAL_LAHIR', 'KELAMIN', 'SALDO', 'JML_KARTU', 'KABUPATEN', 'KECAMATAN', 'KELURAHAN', 'STATUS_AKUN', 'PESAN_PENGKINIAN'];
  for (const key of fields) {
    const el = document.getElementById('edit-' + key);
    if (el) {
      item[key] = key === 'SALDO' ? parseSaldo(el.value) : key === 'JML_KARTU' ? parseJmlKartu(el.value) : el.value;
    }
  }

  const k = item.KELAMIN.toUpperCase();
  if (k === 'L' || k.includes('LAKI')) item.KELAMIN_DISPLAY = 'PRIA';
  else if (k === 'P' || k.includes('PEREMPUAN')) item.KELAMIN_DISPLAY = 'WANITA';
  else item.KELAMIN_DISPLAY = item.KELAMIN || '-';

  item._statusNorm = item.STATUS_AKUN.toUpperCase().replace(/[_\s]/g, '');
  item.KARTU_TYPE = item.JML_KARTU <= 1 ? 'TUNGGAL' : 'SENSOR';
  item.SALDO_FORMAT = formatSaldo(item.SALDO);
  item.KABUPATEN = String(item.KABUPATEN).toUpperCase();
  item.KECAMATAN = String(item.KECAMATAN).toUpperCase();
  item.KELURAHAN = String(item.KELURAHAN).toUpperCase();

  saveToDB().then(() => {
    applyFilters();
    closeEdit();
    showToast('Data berhasil diupdate');
  });
}

function closeEdit() {
  document.getElementById('editModal').classList.remove('active');
  state.editingId = null;
}

function deleteItem(id) {
  if (!confirm('Yakin ingin menghapus data ini?')) return;
  state.items = state.items.filter(i => i.id !== id);
  state.selected.delete(id);
  saveToDB().then(() => {
    applyFilters();
    showToast('Data berhasil dihapus');
  });
}

function selectAll() {
  if (state.selected.size === state.filtered.length && state.filtered.length > 0) {
    state.selected.clear();
    showToast('Semua data tidak dipilih');
  } else {
    for (const item of state.filtered) state.selected.add(item.id);
    showToast(`${state.filtered.length} data dipilih`);
  }
  lastStart = -1; lastEnd = -1;
  renderVirtual();
  saveFilters();
  updateStats();
}

function deleteSelected() {
  if (!state.selected.size) return showToast('Tidak ada data terpilih', 'error');
  if (!confirm(`Yakin ingin menghapus ${state.selected.size} data terpilih?`)) return;
  state.items = state.items.filter(i => !state.selected.has(i.id));
  state.selected.clear();
  saveToDB().then(() => {
    applyFilters();
    showToast('Data terpilih berhasil dihapus');
  });
}

function clearAllData() {
  if (!confirm('Yakin ingin menghapus SEMUA data? Tindakan ini tidak bisa dibatalkan.')) return;
  state.items = [];
  state.selected.clear();
  saveToDB().then(() => {
    applyFilters();
    showToast('Semua data berhasil dihapus');
  });
}

function downloadBlob(content, filename, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ==================== STORAGE ====================
function saveFilters() {
  const data = {
    filters: state.filters,
    darkMode: state.darkMode,
    selected: Array.from(state.selected)
  };
  localStorage.setItem('xlsxExtract_settings', JSON.stringify(data));
}

function loadFilters() {
  try {
    const raw = localStorage.getItem('xlsxExtract_settings');
    if (raw) {
      const data = JSON.parse(raw);
      if (data.filters) state.filters = data.filters;
      if (data.darkMode !== undefined) state.darkMode = data.darkMode;
      if (data.selected) state.selected = new Set(data.selected);
    }
  } catch (e) { console.error(e); }
}

function applyLoadedFilters() {
  document.getElementById('filterKabupaten').value = state.filters.kabupaten;
  document.getElementById('filterKecamatan').value = state.filters.kecamatan;
  document.getElementById('filterKelurahan').value = state.filters.kelurahan;
  document.getElementById('searchInput').value = state.filters.search;
  document.getElementById('sortSelect').value = state.filters.sort;
  if (state.darkMode) {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('themeToggle').textContent = '☀️';
  }
}

// ==================== THEME ====================
function toggleTheme() {
  state.darkMode = !state.darkMode;
  document.documentElement.setAttribute('data-theme', state.darkMode ? 'dark' : 'light');
  document.getElementById('themeToggle').textContent = state.darkMode ? '☀️' : '🌙';
  saveFilters();
}

// ==================== EVENTS ====================
function setupEvents() {
  const fileInput = document.getElementById('fileInput');
  const uploadZone = document.getElementById('uploadZone');

  fileInput.addEventListener('change', (e) => {
    if (e.target.files.length) processFiles(e.target.files);
    e.target.value = '';
  });

  uploadZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadZone.classList.add('dragover');
  });

  uploadZone.addEventListener('dragleave', () => {
    uploadZone.classList.remove('dragover');
  });

  uploadZone.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadZone.classList.remove('dragover');
    if (e.dataTransfer.files.length) processFiles(e.dataTransfer.files);
  });

  document.getElementById('filterKabupaten').addEventListener('change', (e) => {
    state.filters.kabupaten = e.target.value;
    state.filters.kecamatan = '';
    state.filters.kelurahan = '';
    applyFilters();
  });

  document.getElementById('filterKecamatan').addEventListener('change', (e) => {
    state.filters.kecamatan = e.target.value;
    state.filters.kelurahan = '';
    applyFilters();
  });

  document.getElementById('filterKelurahan').addEventListener('change', (e) => {
    state.filters.kelurahan = e.target.value;
    applyFilters();
  });

  document.getElementById('searchInput').addEventListener('input', (e) => {
    state.filters.search = e.target.value;
    applyFilters();
  });

  document.getElementById('sortSelect').addEventListener('change', (e) => {
    state.filters.sort = e.target.value;
    applyFilters();
  });

  document.getElementById('resultsContainer').addEventListener('scroll', () => {
    requestAnimationFrame(renderVirtual);
  });

  document.getElementById('virtualWrapper').addEventListener('click', (e) => {
    const btn = e.target.closest('.btn-copy, .btn-edit, .btn-delete');
    if (btn) {
      const id = btn.dataset.id;
      if (btn.classList.contains('btn-copy')) copyItem(id);
      else if (btn.classList.contains('btn-edit')) editItem(id);
      else if (btn.classList.contains('btn-delete')) deleteItem(id);
      return;
    }

    const cb = e.target.closest('.select-cb');
    if (cb) {
      const id = cb.dataset.id;
      if (cb.checked) state.selected.add(id);
      else state.selected.delete(id);
      saveFilters();
      const card = cb.closest('.data-card');
      if (card) card.classList.toggle('selected', cb.checked);
      updateStats();
    }
  });

  document.getElementById('editModal').addEventListener('click', (e) => {
    if (e.target.id === 'editModal') closeEdit();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeEdit();
  });

  window.addEventListener('resize', () => {
    lastStart = -1; lastEnd = -1;
    renderVirtual();
  });
}

// ==================== INIT ====================
async function init() {
  loadFilters();

  if (typeof XLSX === 'undefined') {
    const banner = document.createElement('div');
    banner.style.cssText = 'background: #ef4444; color: white; padding: 0.75rem; text-align: center; font-size: 0.875rem; position: sticky; top: 0; z-index: 101;';
    banner.innerHTML = '⚠️ Library SheetJS belum dimuat. Untuk penggunaan offline, download <a href="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js" style="color: #fff; text-decoration: underline; font-weight: 700;">xlsx.full.min.js</a> dan letakkan di folder yang sama, lalu ubah src script di file ini.';
    document.body.insertBefore(banner, document.body.firstChild);
  }

  await initDB();
  const saved = await loadFromDB();
  if (saved && saved.length) {
    state.items = saved;
    showToast(`${saved.length} data dimuat dari penyimpanan lokal`);
  }

  applyLoadedFilters();
  applyFilters();
  setupEvents();
}

init();
</script>
